<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | The Vibe Coder</title>
    <meta name="description" content="Get in touch with The Vibe Coder for web development projects and digital solutions.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles/home-minimal.css">
    <script src="theme.js"></script>
    <style>
        .contact-section { padding: 80px 0; }
        .contact-form { max-width: 500px; margin: 0 auto; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; }
        .form-group input, .form-group textarea { 
            width: 100%; 
            padding: 12px 16px; 
            border: 2px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            background: var(--bg);
            color: var(--text);
        }
        .form-group textarea { min-height: 120px; resize: vertical; }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        .btn-submit {
            width: 100%;
            padding: 14px 24px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-submit:hover { opacity: 0.9; }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .form-message { 
            padding: 16px; 
            border-radius: 8px; 
            margin-bottom: 20px;
            text-align: center;
        }
        .form-message.success { background: #d4edda; color: #155724; }
        .form-message.error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <a href="#main-content" class="skiplink">Skip to main content</a>
    <header>
        <div class="container">
            <a href="index.html" class="logo">THE VIBE CODER</a>
            <nav>
                <a href="index.html">Home</a>
            </nav>
        </div>
    </header>

    <main id="main-content">
        <section class="contact-section">
            <div class="container">
                <h1 style="text-align: center; margin-bottom: 12px;">Get in Touch</h1>
                <p style="text-align: center; margin-bottom: 40px; color: var(--text-secondary);">
                    Have a project in mind? Fill out the form below and we'll get back to you.
                </p>
                
                <form id="contactForm" class="contact-form">
                    <div id="formMessage"></div>
                    
                    <div class="form-group">
                        <label for="name">Name *</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" name="phone">
                    </div>
                    
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message"></textarea>
                    </div>
                    
                    <button type="submit" class="btn-submit">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="page-footer">
        <div class="container">
            <p>&copy; 2024 The Vibe Coder. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const form = e.target;
            const messageEl = document.getElementById('formMessage');
            const submitBtn = form.querySelector('.btn-submit');
            
            const data = {
                name: form.name.value,
                email: form.email.value,
                phone: form.phone.value,
                message: form.message.value
            };
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';
            messageEl.innerHTML = '';
            
            try {
                const res = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await res.json();
                
                if (result.success) {
                    messageEl.innerHTML = '<div class="form-message success">' + result.message + '</div>';
                    form.reset();
                } else {
                    messageEl.innerHTML = '<div class="form-message error">' + result.message + '</div>';
                }
            } catch (err) {
                messageEl.innerHTML = '<div class="form-message error">Something went wrong. Please try again.</div>';
            }
            
            submitBtn.disabled = false;
            submitBtn.textContent = 'Send Message';
        });
    </script>
</body>
</html>
